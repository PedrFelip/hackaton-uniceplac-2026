name: Build APK & Publish to Web

on:
  push:
    branches: [main]
    paths:
      - "app/NutriScan/**"
      - ".github/workflows/build-apk.yml"
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('app/NutriScan/**/*.gradle*', 'app/NutriScan/**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        working-directory: app/NutriScan
        run: chmod +x gradlew

      - name: Build Debug APK
        working-directory: app/NutriScan
        run: ./gradlew assembleDebug

      - name: Copy APK to web downloads
        run: |
          mkdir -p web/public/downloads
          cp app/NutriScan/app/build/outputs/apk/debug/app-debug.apk web/public/downloads/nutriscan.apk

      - name: Commit and push APK
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/public/downloads/nutriscan.apk
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: auto-build APK → web/public/downloads/nutriscan.apk"
            git push
          fi
